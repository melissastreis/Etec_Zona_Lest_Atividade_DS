<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floricultura Sayuri</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Floricultura Sayuri</div>
            <div class="menu" id="manu">&#9776;</div>
            <ul class="nav-links" id="nav-links">
                <li><a href="./index.html">Ínicio</a></li>
                <li><a href="./flores.html">Flores</a></li>
                <li><a href="./contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="grid-container">
        <section>
            <h2>Entre em Contato</h2>
            <form class="contato-form">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email" required>

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="4" placeholder="Digite sua mensagem" required></textarea>

                <button tyoe="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Floricultura Sayuri - Todos os direitos reservados</p>
    </footer>

    <script src="menu.js"></script>
</body>
</html>
